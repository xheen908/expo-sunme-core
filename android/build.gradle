plugins {
  id 'com.android.library'
  id 'expo-module-gradle-plugin'
}

group = 'expo.modules.sunmicore'
version = '0.1.0'

android {
  namespace "expo.modules.sunmicore"
  defaultConfig {
    versionCode 1
    versionName "0.1.0"
  }
  lintOptions {
    abortOnError false
  }
}

dependencies {
  implementation 'com.sunmi:printerlibrary:1.0.22'
}

